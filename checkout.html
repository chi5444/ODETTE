<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODETTE — إتمام الطلب</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080808;--surface:#0F0F0F;--surface2:#151515;--border:#222;--border2:#2A2A2A;--gold:#C8A96E;--gold2:#E8C88A;--text:#EDE8DE;--muted:#666;--danger:#E74C3C;--success:#2ECC71}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;cursor:none}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;z-index:0}
#cur{position:fixed;width:6px;height:6px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cur-r{position:fixed;width:28px;height:28px;border:1px solid rgba(200,169,110,.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}
@media(hover:none){#cur,#cur-r{display:none}body{cursor:auto}}

nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:70px;border-bottom:1px solid var(--border);background:rgba(8,8,8,.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.logo{font-family:'Orbitron',sans-serif;font-size:18px;letter-spacing:8px;font-weight:700;color:var(--gold);text-decoration:none}
.nav-back{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;cursor:none}
.nav-back:hover{color:var(--gold)}
.nav-back::after{content:'←'}

.checkout-grid{display:grid;grid-template-columns:1fr 380px;gap:0;min-height:calc(100vh - 70px)}
@media(max-width:900px){.checkout-grid{grid-template-columns:1fr}}

.checkout-form{padding:48px 52px;border-left:1px solid var(--border);position:relative;z-index:1}
@media(max-width:900px){.checkout-form{padding:28px 18px;border-left:none;border-bottom:1px solid var(--border)}}

.section-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:4px;height:4px;background:var(--gold);border-radius:50%}
.field{margin-bottom:16px}
.field label{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-family:'Orbitron',sans-serif}
.field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:11px 14px;font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.field-row{grid-template-columns:1fr}}
.field input::placeholder,.field textarea::placeholder{color:var(--muted)}
.field select option{background:var(--surface)}

/* PAYMENT METHODS */
.pay-methods{display:flex;flex-direction:column;gap:10px;margin-bottom:0}
.pay-option{border:1px solid var(--border2);padding:14px 16px;cursor:none;transition:all .2s;display:flex;align-items:center;gap:14px;background:var(--surface2)}
.pay-option:hover{border-color:rgba(200,169,110,.3)}
.pay-option.selected{border-color:var(--gold);background:rgba(200,169,110,.06)}
.pay-radio{width:18px;height:18px;border:1px solid var(--border2);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pay-option.selected .pay-radio{border-color:var(--gold)}
.pay-radio-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;opacity:0;transform:scale(0);transition:all .2s}
.pay-option.selected .pay-radio-dot{opacity:1;transform:scale(1)}
.pay-icon{font-size:20px;flex-shrink:0}
.pay-info .pay-name{font-size:13px;font-weight:700;margin-bottom:2px}
.pay-info .pay-desc{font-size:11px;color:var(--muted)}
.pay-badge{margin-right:auto;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;padding:3px 8px;border:1px solid var(--gold);color:var(--gold);text-transform:uppercase;flex-shrink:0}
[dir="rtl"] .pay-badge{margin-right:0;margin-left:auto}

/* ORDER SUMMARY */
.order-sum{padding:48px 40px;background:var(--surface);position:relative;z-index:1}
@media(max-width:900px){.order-sum{padding:28px 18px}}
.sum-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:24px}
.cart-items-list{margin-bottom:20px;max-height:40vh;overflow-y:auto}
.oi{display:flex;gap:12px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.oi:last-child{border-bottom:none}
.oi-img{width:64px;height:64px;object-fit:cover;background:var(--surface2);flex-shrink:0;filter:brightness(.8)}
.oi-info{flex:1}
.oi-brand{font-size:7px;letter-spacing:2px;color:var(--gold);font-family:'Orbitron',sans-serif;text-transform:uppercase}
.oi-name{font-size:13px;font-weight:700;margin:3px 0;line-height:1.2}
.oi-sub{font-size:10px;color:var(--muted)}
.oi-price{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:600;color:var(--gold);margin-top:6px}
.oi-qty{font-size:10px;color:var(--muted);margin-top:2px;font-family:'Orbitron',sans-serif}
.divider{height:1px;background:var(--border);margin:16px 0}
.sum-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;color:var(--muted)}
.sum-row .amount{font-family:'Orbitron',sans-serif;color:var(--text)}
.sum-total{display:flex;justify-content:space-between;margin:16px 0 24px;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:600}
.sum-total .amount{color:var(--gold)}
.btn-order{width:100%;padding:15px;background:var(--gold);color:#080808;font-size:9px;letter-spacing:4px;text-transform:uppercase;border:none;cursor:none;font-weight:700;font-family:'Orbitron',sans-serif;transition:all .3s;margin-bottom:10px}
.btn-order:hover{background:var(--gold2)}
.btn-order:disabled{opacity:.5}
.secure-note{display:flex;align-items:center;justify-content:center;gap:6px;font-size:9px;color:var(--muted);font-family:'Orbitron',sans-serif;letter-spacing:1px}

.gap{margin-bottom:28px}
.error-msg{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--danger);padding:10px 14px;font-size:11px;margin-bottom:14px;display:none;font-family:'Tajawal',sans-serif;text-align:center}

.success-overlay{position:fixed;inset:0;background:rgba(8,8,8,.97);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.success-overlay.show{display:flex}
.success-icon{font-size:52px;margin-bottom:24px;animation:pop .5s ease}
@keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.success-ttl{font-family:'Orbitron',sans-serif;font-size:18px;letter-spacing:4px;color:var(--gold);margin-bottom:12px}
.success-txt{font-size:14px;color:var(--muted);line-height:2;max-width:460px;margin-bottom:28px}
.success-order{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--border2);margin-bottom:28px;letter-spacing:2px}
.empty-cart-msg{text-align:center;padding:60px 40px;color:var(--muted)}
.empty-cart-msg p{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;margin-bottom:20px}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-r"></div>

<nav>
  <a class="logo" href="index.html">ODETTE</a>
  <a class="nav-back" href="index.html">متابعة التسوق</a>
</nav>

<div class="checkout-grid" id="checkoutGrid">
  <!-- FORM -->
  <div class="checkout-form">
    <div class="error-msg" id="errMsg"></div>

    <!-- DELIVERY INFO -->
    <div class="gap">
      <div class="section-title">معلومات التوصيل</div>
      <div class="field-row">
        <div class="field">
          <label>الاسم الكامل</label>
          <input type="text" id="cName" placeholder="اسمك الكامل">
        </div>
        <div class="field">
          <label>رقم الهاتف</label>
          <input type="tel" id="cPhone" placeholder="+216 XX XXX XXX" style="direction:ltr;text-align:left">
        </div>
      </div>
      <div class="field">
        <label>العنوان الكامل</label>
        <input type="text" id="cAddress" placeholder="الشارع، المدينة، الولاية">
      </div>
      <div class="field">
        <label>ملاحظات للتوصيل (اختياري)</label>
        <textarea id="cNotes" placeholder="أي تعليمات خاصة للتوصيل..."></textarea>
      </div>
    </div>

    <!-- PAYMENT -->
    <div>
      <div class="section-title">طريقة الدفع</div>
      <div class="pay-methods" id="payMethods"></div>
    </div>
  </div>

  <!-- ORDER SUMMARY -->
  <div class="order-sum">
    <div class="sum-title">ملخص الطلب</div>
    <div class="cart-items-list" id="cartItemsList"></div>
    <div class="divider"></div>
    <div class="sum-row"><span>المجموع الجزئي</span><span class="amount" id="subtotalAmt">0 DT</span></div>
    <div class="sum-row"><span>التوصيل</span><span class="amount" style="color:var(--gold)" id="deliveryAmt">احتساب لاحقاً</span></div>
    <div class="divider"></div>
    <div class="sum-total"><span>الإجمالي</span><span class="amount" id="totalAmt">0 DT</span></div>
    <button class="btn-order" id="orderBtn" onclick="submitOrder()">تأكيد الطلب</button>
    <div class="secure-note">🔒 دفع آمن · ضمان الأصالة · توصيل مضمون</div>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
  <div class="success-ttl">تم تأكيد طلبك!</div>
  <div class="success-txt" id="successTxt">شكراً لك! تم استلام طلبك بنجاح. سنتواصل معك قريباً لتأكيد التوصيل.</div>
  <div class="success-order" id="successOrderId"></div>
  <button class="btn-order" style="max-width:280px" onclick="window.location.href='index.html'">العودة للمتجر</button>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
const PAYMENTS = [
  { id: 'cod', name: 'الدفع عند الاستلام', desc: 'ادفعي نقداً عند استلام طلبك', icon: '💵', badge: null },
  { id: 'bank', name: 'تحويل بنكي', desc: 'تحويل مباشر لحسابنا البنكي', icon: '🏦', badge: null },
  { id: 'baridi', name: 'بريدي موب', desc: 'الدفع عبر تطبيق بريدي موب', icon: '📱', badge: 'الأسرع' },
  { id: 'whatsapp', name: 'الدفع عبر WhatsApp', desc: 'تواصلي معنا مباشرة', icon: '💬', badge: null },
];

let selectedPayment = 'cod';

function renderPayments() {
  document.getElementById('payMethods').innerHTML = PAYMENTS.map(p => `
    <div class="pay-option${selectedPayment === p.id ? ' selected' : ''}" onclick="selectPayment('${p.id}')">
      <div class="pay-radio"><div class="pay-radio-dot"></div></div>
      <div class="pay-icon">${p.icon}</div>
      <div class="pay-info">
        <div class="pay-name">${p.name}</div>
        <div class="pay-desc">${p.desc}</div>
      </div>
      ${p.badge ? `<div class="pay-badge">${p.badge}</div>` : ''}
    </div>
  `).join('');
}

function selectPayment(id) {
  selectedPayment = id;
  renderPayments();
}

function renderCartItems() {
  const cart = getCart();
  const el = document.getElementById('cartItemsList');
  if (!cart.length) {
    el.innerHTML = `<div class="empty-cart-msg"><p>السلة فارغة</p><button class="btn-order" onclick="window.location.href='index.html'">تسوقي الآن</button></div>`;
    document.getElementById('orderBtn').style.display = 'none';
    return;
  }
  el.innerHTML = cart.map(c => `
    <div class="oi">
      <img class="oi-img" src="${c.image_url || ''}" alt="${c.name_ar}">
      <div class="oi-info">
        <div class="oi-brand">${c.brand}</div>
        <div class="oi-name">${c.name_ar}</div>
        <div class="oi-sub">${c.description || ''}</div>
        <div class="oi-price">${(c.price * c.qty).toLocaleString()} DT</div>
        <div class="oi-qty">الكمية: ${c.qty}</div>
      </div>
    </div>
  `).join('');
  const total = getCartTotal();
  document.getElementById('subtotalAmt').textContent = total.toLocaleString() + ' DT';
  document.getElementById('totalAmt').textContent = total.toLocaleString() + ' DT';
  document.getElementById('deliveryAmt').textContent = total >= 300 ? 'مجاني 🎉' : 'سيُحدد لاحقاً';
}

async function submitOrder() {
  const name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  const address = document.getElementById('cAddress').value.trim();
  const notes = document.getElementById('cNotes').value.trim();
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('orderBtn');
  const cart = getCart();

  err.style.display = 'none';

  if (!cart.length) { err.textContent = 'السلة فارغة'; err.style.display = 'block'; return; }
  if (!name) { err.textContent = 'يرجى إدخال الاسم الكامل'; err.style.display = 'block'; return; }
  if (!phone) { err.textContent = 'يرجى إدخال رقم الهاتف'; err.style.display = 'block'; return; }
  if (!address) { err.textContent = 'يرجى إدخال عنوان التوصيل'; err.style.display = 'block'; return; }

  btn.disabled = true;
  btn.textContent = 'جاري إرسال الطلب...';

  const user = await getUser();
  const total = getCartTotal();

  const { data, error } = await supabase.from('orders').insert([{
    user_id: user?.id || null,
    items: cart,
    total,
    status: 'pending',
    customer_name: name,
    customer_phone: phone,
    customer_address: address,
    payment_method: selectedPayment,
    notes,
  }]).select().single();

  if (error) {
    err.textContent = 'حدث خطأ أثناء إرسال الطلب، يرجى المحاولة مجدداً';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'تأكيد الطلب';
    return;
  }

  clearCart();

  // Redirect for WhatsApp payment
  if (selectedPayment === 'whatsapp') {
    const itemsList = cart.map(c => `• ${c.name_ar} × ${c.qty} = ${(c.price * c.qty).toLocaleString()} DT`).join('\n');
    const msg = encodeURIComponent(`🛍️ طلب جديد من ODETTE\n\nالاسم: ${name}\nالهاتف: ${phone}\nالعنوان: ${address}\n\nالمنتجات:\n${itemsList}\n\nالإجمالي: ${total.toLocaleString()} DT\nرقم الطلب: ${data.id.slice(0, 8).toUpperCase()}`);
    window.open(`https://wa.me/21696672771?text=${msg}`, '_blank');
  }

  document.getElementById('successOrderId').textContent = `رقم الطلب: ${data.id.slice(0, 8).toUpperCase()}`;
  document.getElementById('successOverlay').classList.add('show');
}

renderPayments();
renderCartItems();

const cur = document.getElementById('cur'), cr = document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
(function loop(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; cr.style.left=rx+'px'; cr.style.top=ry+'px'; requestAnimationFrame(loop); })();
</script>
</body>
</html>
