<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Odette</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--rose:#d4879a;--rose-lt:#fdf0f3;--rose-md:#f2d0d9;--rose-dk:#b5607a;--white:#ffffff;--ink:#1f1419;--muted:#9a7d84;--border:#f0dde3;--red:#e74c3c}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#f9d5df,#fce8ee 40%,#f5e6ec);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--white);border-radius:20px;box-shadow:0 20px 60px rgba(212,135,154,.25);width:100%;max-width:420px;overflow:hidden}
.card-top{background:linear-gradient(135deg,var(--rose-dk),var(--rose));padding:32px 32px 28px;text-align:center}
.logo{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;font-style:italic;color:white;letter-spacing:1px;display:block;text-decoration:none;margin-bottom:6px}
.logo span{opacity:.8}
.card-top p{font-size:13px;color:rgba(255,255,255,.8);font-weight:600}
.card-body{padding:28px 32px 32px}
.tabs{display:flex;background:var(--rose-lt);border-radius:10px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;border:none;background:none;border-radius:7px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
.tab.on{background:var(--white);color:var(--rose-dk);box-shadow:0 2px 8px rgba(212,135,154,.2)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fi{width:100%;background:#fdf5f7;border:1.5px solid var(--border);color:var(--ink);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;padding:12px 14px;border-radius:8px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--rose)}
.fi::placeholder{color:#d4b0bb;font-weight:400}
.btn{width:100%;background:linear-gradient(135deg,var(--rose-dk),var(--rose));color:white;border:none;padding:14px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all .25s;margin-top:8px}
.btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-2px);box-shadow:0 8px 24px rgba(181,96,122,.4)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{background:#fff0f0;border:1.5px solid var(--red);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);font-weight:700;margin-bottom:14px;display:none}
.err.on{display:block}
.suc{background:#f0fff4;border:1.5px solid #2ecc71;border-radius:8px;padding:10px 14px;font-size:13px;color:#27ae60;font-weight:700;margin-bottom:14px;display:none}
.suc.on{display:block}
.back-link{display:block;text-align:center;margin-top:18px;font-size:12px;color:var(--muted);font-weight:700;text-decoration:none}
.back-link:hover{color:var(--rose-dk)}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <a class="logo" href="/">Od<span>e</span>tte</a>
    <p>Bienvenue dans votre espace</p>
  </div>
  <div class="card-body">
    <div class="tabs">
      <button class="tab on" id="tabLogin" onclick="switchTab('login')">Se connecter</button>
      <button class="tab" id="tabReg" onclick="switchTab('register')">Créer un compte</button>
    </div>

    <div id="errBox" class="err"></div>
    <div id="sucBox" class="suc"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="lEmail" required placeholder="vous@exemple.com"></div>
      <div class="fg"><label class="fl">Mot de passe</label><input class="fi" type="password" id="lPass" required placeholder="••••••••"></div>
      <button class="btn" id="lBtn" type="submit">Se connecter →</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="regForm" onsubmit="doRegister(event)" style="display:none">
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="rEmail" required placeholder="vous@exemple.com"></div>
      <div class="fg"><label class="fl">Mot de passe</label><input class="fi" type="password" id="rPass" required placeholder="Minimum 6 caractères" minlength="6"></div>
      <div class="fg"><label class="fl">Confirmer le mot de passe</label><input class="fi" type="password" id="rPass2" required placeholder="Répétez votre mot de passe"></div>
      <button class="btn" id="rBtn" type="submit">Créer mon compte →</button>
    </form>

    <a class="back-link" href="/">← Retour à la boutique</a>
  </div>
</div>

<script type="module">
import { supabase } from '/js/supabase.js';
import { getUser } from '/js/auth.js';

// Redirect if already logged in
getUser().then(user => { if (user) window.location.href = '/'; });

function showErr(msg) { const e = document.getElementById('errBox'); e.textContent = msg; e.classList.add('on'); document.getElementById('sucBox').classList.remove('on'); }
function showSuc(msg) { const s = document.getElementById('sucBox'); s.textContent = msg; s.classList.add('on'); document.getElementById('errBox').classList.remove('on'); }
function clearMsg() { document.getElementById('errBox').classList.remove('on'); document.getElementById('sucBox').classList.remove('on'); }

window.switchTab = function(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('regForm').style.display   = tab === 'register' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('on', tab === 'login');
  document.getElementById('tabReg').classList.toggle('on', tab === 'register');
  clearMsg();
};

window.doLogin = async function(e) {
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('lBtn');
  btn.disabled = true; btn.textContent = 'Connexion…';
  const { data, error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('lEmail').value,
    password: document.getElementById('lPass').value,
  });
  if (error) { showErr('Email ou mot de passe incorrect.'); btn.disabled = false; btn.textContent = 'Se connecter →'; return; }
  window.location.href = data.user.email === 'admin@odette.com' ? '/admin/' : '/';
};

window.doRegister = async function(e) {
  e.preventDefault();
  clearMsg();
  const p1 = document.getElementById('rPass').value;
  const p2 = document.getElementById('rPass2').value;
  if (p1 !== p2) { showErr('Les mots de passe ne correspondent pas.'); return; }
  const btn = document.getElementById('rBtn');
  btn.disabled = true; btn.textContent = 'Création…';
  const { error } = await supabase.auth.signUp({
    email: document.getElementById('rEmail').value,
    password: p1,
    options: { emailRedirectTo: window.location.origin }
  });
  if (error) { showErr(error.message); btn.disabled = false; btn.textContent = 'Créer mon compte →'; return; }
  showSuc('Compte créé ! Vous pouvez maintenant vous connecter.');
  btn.disabled = false; btn.textContent = 'Créer mon compte →';
  switchTab('login');
};
</script>
</body>
</html>
