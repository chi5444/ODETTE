<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODETTE — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080808;--surface:#0F0F0F;--surface2:#151515;--border:#222;--border2:#2A2A2A;--gold:#C8A96E;--gold2:#E8C88A;--text:#EDE8DE;--muted:#666;--danger:#E74C3C;--success:#2ECC71}
html{height:100%}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;display:flex;flex-direction:column;cursor:none}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;z-index:0}
#cur{position:fixed;width:6px;height:6px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cur-r{position:fixed;width:28px;height:28px;border:1px solid rgba(200,169,110,.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}
@media(hover:none){#cur,#cur-r{display:none}body{cursor:auto}}

nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;border-bottom:1px solid var(--border);position:relative;z-index:1}
.logo{font-family:'Orbitron',sans-serif;font-size:18px;letter-spacing:8px;font-weight:700;color:var(--gold);text-decoration:none}
.nav-back{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;cursor:none}
.nav-back:hover{color:var(--gold)}
.nav-back::after{content:'←'}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px;position:relative;z-index:1}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);padding:44px 40px}
.auth-logo{font-family:'Orbitron',sans-serif;font-size:22px;letter-spacing:6px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:6px}
.auth-sub{text-align:center;font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:36px;font-family:'Orbitron',sans-serif;text-transform:uppercase}
.field{margin-bottom:18px}
.field label{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-family:'Orbitron',sans-serif}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:12px 16px;font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:border-color .2s;direction:ltr;text-align:left}
.field input:focus{border-color:var(--gold)}
.field input::placeholder{color:var(--muted);font-size:12px}
.btn-submit{width:100%;padding:14px;background:var(--gold);color:#080808;font-size:9px;letter-spacing:4px;text-transform:uppercase;border:none;cursor:none;font-weight:700;font-family:'Orbitron',sans-serif;transition:all .3s;margin-top:4px}
.btn-submit:hover{background:var(--gold2)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.auth-link{text-align:center;margin-top:22px;font-size:12px;color:var(--muted)}
.auth-link a{color:var(--gold);text-decoration:none;cursor:none;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px}
.auth-link a:hover{color:var(--gold2)}
.error-msg{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--danger);padding:10px 14px;font-size:11px;margin-bottom:16px;display:none;font-family:'Tajawal',sans-serif;text-align:center}
.success-msg{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:var(--success);padding:10px 14px;font-size:11px;margin-bottom:16px;display:none;font-family:'Tajawal',sans-serif;text-align:center}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--muted);font-size:10px;letter-spacing:2px;font-family:'Orbitron',sans-serif}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.gold-line{width:40px;height:2px;background:linear-gradient(to left,transparent,var(--gold),transparent);margin:0 auto 28px}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-r"></div>

<nav>
  <a class="logo" href="index.html">ODETTE</a>
  <a class="nav-back" href="index.html">العودة للمتجر</a>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-logo">ODETTE</div>
    <div class="gold-line"></div>
    <div class="auth-sub">تسجيل الدخول</div>

    <div class="error-msg" id="errMsg"></div>
    <div class="success-msg" id="okMsg"></div>

    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">دخول</button>

    <div class="divider">أو</div>

    <div class="auth-link">
      ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a>
    </div>
  </div>
</main>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  const ok = document.getElementById('okMsg');

  err.style.display = 'none';
  ok.style.display = 'none';

  if (!email || !password) {
    err.textContent = 'يرجى إدخال البريد الإلكتروني وكلمة المرور';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'جاري الدخول...';

  const { data, error } = await signIn(email, password);

  if (error) {
    err.textContent = error.message === 'Invalid login credentials'
      ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة'
      : 'حدث خطأ، يرجى المحاولة مجدداً';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'دخول';
    return;
  }

  ok.textContent = 'تم الدخول بنجاح! جاري التحويل...';
  ok.style.display = 'block';

  // Redirect: admin → admin panel, else → home
  if (isAdminEmail(data.user.email)) {
    setTimeout(() => window.location.href = 'admin/index.html', 800);
  } else {
    const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
    setTimeout(() => window.location.href = redirect, 800);
  }
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

// Cursor
const cur = document.getElementById('cur'), cr = document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
(function loop(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; cr.style.left=rx+'px'; cr.style.top=ry+'px'; requestAnimationFrame(loop); })();

// Check already logged in
getUser().then(user => { if (user) window.location.href = isAdminEmail(user.email) ? 'admin/index.html' : 'index.html'; });
</script>
</body>
</html>
